name: Basic AAC Demo
description: Child, Grandpa, Mom, and a Playground
scene: "<default>"   # activate the built-in default scene first, so this demo works regardless of active scene
mode: sentence
audio: on
tileWait: .human
sentenceWait: .human

script:
  - comment: Basic AAC interaction flow
  
  - tiles:
    - <home>, grandpa, <places>, playground, +
    - <home>, <drinks>, lemonade
    - <tilescript:replay>
  
  - tiles:
    - <home>, mom, <body_health>, stomachache, +
    - <home>, <social>, bathroom
    - <tilescript:replay>

  - comment: Demo complete
